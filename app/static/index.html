  <script>
    window.MathJax = {

        inlineMath: [['$', '$'], ['\\(', '\\)']],

<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const API = "/api/v1";
const SAMPLE = String.raw`\begin{proof}
Пусть $G$ — конечная группа порядка $n$ и $g \in G$ — произвольный элемент.
Рассмотрим циклическую подгруппу $\langle g \rangle$, порождённую элементом $g$.
По теореме Лагранжа, порядок подгруппы $|\langle g \rangle|$ делит $|G| = n$.
Поскольку порядок элемента $\mathrm{ord}(g)=|\langle g \rangle|$, получаем, что $\mathrm{ord}(g) \mid n$.
Следовательно, $g^n = e$.
\end{proof}`;

function normalizeLatexForRender(input) {
  if (!input) return "";
  return String(input)
    .replace(/\\begin\{proof\}/g, "")
    .replace(/\\end\{proof\}/g, "")
    .trim();
}

function severityClass(severity) {
  if (severity === "error") return "error";
  if (severity === "warning") return "warning";
  return "info";
}

function hasOwnStepId(remark) {
  return Number.isInteger(remark?.step_id);
}

function uniqueStrings(values) {
  return [...new Set((values || []).filter(Boolean).map((item) => String(item).trim()).filter(Boolean))];
}

function getLatestEntry(history, agent, phase) {
  if (!Array.isArray(history)) return null;
  for (let i = history.length - 1; i >= 0; i -= 1) {
    const entry = history[i];
    if (entry?.agent === agent && entry?.phase === phase) {
      return entry;
    }
  }
  return null;
}

function extractStepTheoremMap(result) {
  const parsedSteps = result?.parsed_steps || [];
  const history = result?.debate_history || [];
  const remarks = result?.remarks || [];
  const map = Object.fromEntries(parsedSteps.map((_, index) => [index, []]));

  parsedSteps.forEach((step, index) => {
    (step?.used_theorems || []).forEach((item) => {
      map[index].push({
        factName: item?.fact_name || "",
        theoremName: item?.theorem_name || item?.matched_theorem || "",
        references: uniqueStrings(item?.references || []),
        source: uniqueStrings(item?.sources || []).join(",") || "parsed_step",
      });
    });
  });

  const formulatorFacts = getLatestEntry(history, "formulator", "fact_checking");
  const criticFacts = getLatestEntry(history, "critic", "fact_checking");

  Object.entries(formulatorFacts?.step_results || {}).forEach(([rawIndex, stepData]) => {
    const index = Number(rawIndex);
    if (!Number.isInteger(index) || !map[index]) return;

    (stepData?.facts_found || []).forEach((fact) => {
      map[index].push({
        factName: fact?.name || "",
        theoremName: fact?.matched_theorem || "",
        references: uniqueStrings([
          fact?.matched_theorem,
          ...(fact?.rag_references || []),
        ]),
        source: "formulator",
      });
    });

    (stepData?.remarks || []).forEach((remark) => {
      map[index].push({
        factName: remark?.fact_name || "",
        theoremName: remark?.fact_name || "",
        references: uniqueStrings([
          remark?.fact_name,
          ...(remark?.rag_references || []),
        ]),
        source: "formulator_remark",
      });
    });
  });

  Object.entries(criticFacts?.step_reviews || {}).forEach(([rawIndex, stepData]) => {
    const index = Number(rawIndex);
    if (!Number.isInteger(index) || !map[index]) return;
    map[index].push({
      factName: "",
      theoremName: "",
      references: uniqueStrings(stepData?.rag_references_found || []),
      source: "critic",
    });
  });

  remarks.forEach((remark) => {
    const index = remark?.step_id;
    if (!Number.isInteger(index) || !map[index]) return;
    map[index].push({
      factName: remark?.fact_name || "",
      theoremName: remark?.fact_name || "",
      references: uniqueStrings([
        remark?.fact_name,
        ...(remark?.rag_references || []),
      ]),
      source: "final_remark",
    });
  });

  return Object.fromEntries(
    Object.entries(map).map(([rawIndex, items]) => {
      const grouped = new Map();

      items.forEach((item) => {
        const refs = uniqueStrings(item.references);
        const key = refs.join("|") || item.factName || item.theoremName || item.source;
        if (!key) return;

        const existing = grouped.get(key);
        if (existing) {
          existing.factNames = uniqueStrings([...existing.factNames, item.factName]);
          existing.references = uniqueStrings([...existing.references, ...refs]);
          existing.sources = uniqueStrings([...existing.sources, item.source]);
          if (!existing.theoremName && item.theoremName) {
            existing.theoremName = item.theoremName;
          }
          return;
        }

        grouped.set(key, {
          theoremName: item.theoremName || refs[0] || "",
          factNames: uniqueStrings([item.factName]),
          references: refs,
          sources: uniqueStrings([item.source]),
        });
      });

      const normalizedItems = [...grouped.values()].map((item) => ({
        ...item,
        theoremName: item.theoremName || item.references[0] || item.factNames[0] || "",
      }));

      return [rawIndex, normalizedItems];
    })
  );
}

function MathText({ text, className = "", inline = false }) {
  const ref = useRef(null);

  useEffect(() => {
    const node = ref.current;
    if (!node) return;

    const normalized = normalizeLatexForRender(text);
    node.textContent = normalized;

    if (window.MathJax?.typesetPromise) {
      window.MathJax.typesetClear?.([node]);
      window.MathJax.typesetPromise([node]).catch((err) => {
        console.error("MathJax render error:", err);
      });
    }
  }, [text]);

  return (
    <div
      ref={ref}
      className={`${className} math-box`}
      style={inline ? { display: "inline-block" } : undefined}
    />
  );
}

function RemarkCard({ remark, theoremsCache }) {
  const refs = remark.rag_references || [];
  const cls = severityClass(remark.severity);

  return (
    <div className={`remark-card ${cls}`}>
      <div className="remark-meta-row">
        <span className={`pill ${cls}`}>{remark.severity || "info"}</span>
        {remark.phase && <span className="pill info">{remark.phase}</span>}
        {(remark.reported_by || remark.source) && (
          <span className="pill info">{remark.reported_by || remark.source}</span>
        )}
      </div>

      <div className="remark-message">
        {remark.message || "Без текста замечания"}
      </div>

      {remark.suggestion && (
        <div className="remark-extra">
          <strong>Как исправить:</strong> {remark.suggestion}
        </div>
      )}

      {Array.isArray(remark.affected_steps) && remark.affected_steps.length > 0 && (
        <div className="remark-extra">
          <strong>Затронутые шаги:</strong> {remark.affected_steps.join(", ")}
        </div>
      )}

      {Array.isArray(remark.missing_conditions) && remark.missing_conditions.length > 0 && (
        <div className="remark-extra">
          <strong>Невыполненные условия:</strong> {remark.missing_conditions.join(", ")}
        </div>
      )}

      {refs.length > 0 && (
        <div className="theorem-box">
          <strong>RAG references</strong>
          {refs.map((name) => {
            const item = theoremsCache[name];
            return (
              <div key={name} style={{ marginTop: 8 }}>
                <div><strong>{name}</strong></div>
                <div className="muted">{item?.statement || "Загрузка формулировки..."}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function StepTheoremsPanel({ items, theoremsCache }) {
  if (!items.length) {
    return (
      <div className="step-theorems-panel">
        <div className="muted">
          Для этого шага в финальном ответе не нашлось явных ссылок на теоремы. Это означает, что модель либо не использовала RAG на шаге, либо не вернула ссылку в структурированном виде.
        </div>
      </div>
    );
  }

  return (
    <div className="step-theorems-panel">
      <div style={{ fontWeight: 800, marginBottom: 10 }}>Теоремы и факты, на которые опирался шаг</div>
      {items.map((item, index) => {
        const theorem = item.references.map((name) => theoremsCache[name]).find(Boolean);
        const displayName = theorem?.name || item.theoremName || item.references[0] || item.factNames[0] || "Неизвестная теорема";

        return (
          <div className="theorem-card" key={`${displayName}-${index}`}>
            <div className="theorem-card-title">{displayName}</div>

            {item.factNames.length > 0 && (
              <div className="theorem-card-meta">
                Модель выделила факт: {item.factNames.join(", ")}
              </div>
            )}

            {(theorem?.type || theorem?.category) && (
              <div className="theorem-card-meta">
                {[theorem?.type, theorem?.category].filter(Boolean).join(" · ")}
              </div>
            )}

            <div className="theorem-card-text">
              {theorem?.statement || "Данной формулировки нет в базе знаний, скорее всего, это не теорема, а общеизвестный факт."}
            </div>

            {theorem?.latex && (
              <div style={{ marginTop: 8 }}>
                <MathText text={theorem.latex} className="muted" />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [latex, setLatex] = useState(SAMPLE);
  const [proofId, setProofId] = useState(`proof_${Date.now()}`);
  const [topic, setTopic] = useState("теория групп");
  const [level, setLevel] = useState("undergraduate");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [jobId, setJobId] = useState("");
  const [jobStatus, setJobStatus] = useState("");
  const [jobLookupId, setJobLookupId] = useState("");
  const [jobLookupLoading, setJobLookupLoading] = useState(false);
  const [theoremsCache, setTheoremsCache] = useState({});
  const [activeStepIndex, setActiveStepIndex] = useState(null);

  async function requestJson(url, options = {}) {
    const resp = await fetch(url, {
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      ...options,
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
    return data;
  }

  const payload = useMemo(() => ({
    proof_id: proofId,
    latex,
    context: { topic, level },
  }), [proofId, latex, topic, level]);

  async function runDirect() {
    setLoading(true);
    setError("");
    setJobId("");
    setJobStatus("");

    try {
      const data = await requestJson(`${API}/proofs/verify`, {
        method: "POST",
        body: JSON.stringify(payload),
      });
      setResult(data);
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setLoading(false);
    }
  }

  async function runAsJob() {
    setLoading(true);
    setError("");
    setResult(null);

    try {
      const data = await requestJson(`${API}/proofs/jobs`, {
        method: "POST",
        body: JSON.stringify(payload),
      });
      setJobId(data.job_id);
      setJobLookupId(data.job_id);
      setJobStatus(data.status);
    } catch (e) {
      setError(e.message || String(e));
      setLoading(false);
    }
  }

  async function fetchJobById(rawId) {
    const id = String(rawId || "").trim();
    if (!id) {
      setError("Введите job id");
      return;
    }

    setJobLookupLoading(true);
    setError("");

    try {
      const job = await requestJson(`${API}/proofs/jobs/${id}`);

      setJobId(id);
      setJobLookupId(id);
      setJobStatus(job.status);

      if (job.status === "completed") {
        setResult(job.result);
        setLoading(false);
      } else if (job.status === "failed") {
        setResult(null);
        setLoading(false);
        setError(job.error || "Job failed");
      } else {
        setResult(null);
        setLoading(true);
      }
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setJobLookupLoading(false);
    }
  }

  useEffect(() => {
    if (!jobId) return;

    let cancelled = false;
    const timer = setInterval(async () => {
      try {
        const job = await requestJson(`${API}/proofs/jobs/${jobId}`);
        if (cancelled) return;

        setJobStatus(job.status);

        if (job.status === "completed") {
          setResult(job.result);
          setLoading(false);
          clearInterval(timer);
        }

        if (job.status === "failed") {
          setError(job.error || "Job failed");
          setLoading(false);
          clearInterval(timer);
        }
      } catch (e) {
        if (!cancelled) setError(e.message || String(e));
      }
    }, 1800);

    return () => {
      cancelled = true;
      clearInterval(timer);
    };
  }, [jobId]);

  async function loadTheorems(names) {
    const filtered = names.filter(Boolean).filter((name) => !theoremsCache[name]);
    if (!filtered.length) return;

    const data = await requestJson(`${API}/theorems?names=${encodeURIComponent(filtered.join("|"))}`);
    setTheoremsCache((prev) => {
      const map = { ...prev };
      data.forEach((item) => {
        map[item.name] = item;
      });
      return map;
    });
  }

  useEffect(() => {
    if (!result) return;
    const stepTheoremMap = extractStepTheoremMap(result);
    const refs = uniqueStrings([
      ...(result.remarks || []).flatMap((r) => r.rag_references || []),
      ...Object.values(stepTheoremMap).flatMap((items) => items.flatMap((item) => item.references || [])),
    ]);
    if (refs.length) {
      loadTheorems(refs).catch(console.error);
    }
  }, [result]);

  useEffect(() => {
    setActiveStepIndex(null);
  }, [result]);

  useEffect(() => {
    if (window.MathJax?.typesetPromise) {
      window.MathJax.typesetPromise().catch(console.error);
    }
  }, [result, latex]);

  const allRemarks = result?.remarks || [];
  const stepTheoremMap = useMemo(() => extractStepTheoremMap(result), [result]);

  const globalRemarks = allRemarks.filter((remark) => {
    return !hasOwnStepId(remark);
  });

  return (
    <div className="app">
      <div className="hero">
        <div>
          <h1>ProofsAnalyze</h1>
          <p>Асинхронный сервис верификации математических доказательств: LaTeX → шаги → факты → логика.</p>
        </div>
        <div className="badge">FastAPI · async API · RAG · multi-agent</div>
      </div>

      <div className="grid">
        <div className="panel">
          <div className="panel-header">
            <div>
              <div className="panel-title">Редактор доказательства</div>
              <div className="panel-subtitle">Слева LaTeX, справа человекочитаемый предпросмотр</div>
            </div>
          </div>

          <div className="editor-wrap">
            <textarea value={latex} onChange={(e) => setLatex(e.target.value)} />
            <div className="preview">
              <MathText text={latex} />
            </div>
          </div>

          <div className="controls">
            <div className="field">
              <label>ID доказательства</label>
              <input value={proofId} onChange={(e) => setProofId(e.target.value)} />
            </div>

            <div className="field">
              <label>Область</label>
              <input value={topic} onChange={(e) => setTopic(e.target.value)} />
            </div>

            <div className="field">
              <label>Уровень</label>
              <select value={level} onChange={(e) => setLevel(e.target.value)}>
                <option value="elementary">elementary</option>
                <option value="undergraduate">undergraduate</option>
                <option value="graduate">graduate</option>
              </select>
            </div>

            <div className="field">
              <label>Шаблон</label>
              <button className="secondary" onClick={() => setLatex(SAMPLE)}>Подставить пример</button>
            </div>

            <div className="actions">
              <button className="primary" onClick={runDirect} disabled={loading || jobLookupLoading}>
                Проверить сразу
              </button>
              <button className="secondary" onClick={runAsJob} disabled={loading || jobLookupLoading}>
                Отправить как job
              </button>
              {loading && (
                <span className="muted">
                  Идёт анализ. Для долгих доказательств лучше использовать job-режим.
                </span>
              )}
            </div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-header">
            <div>
              <div className="panel-title">Результат проверки</div>
              <div className="panel-subtitle">Замечания агентов, шаги доказательства и ссылки на теоремы</div>
            </div>
          </div>

          <div className="result-content">
            <div className="job-search-box">
              <div className="panel-title">Найти job по ID</div>
              <div className="panel-subtitle">Можно открыть уже созданную задачу и посмотреть её текущий статус или конечный результат.</div>
              <div className="job-search-row">
                <input
                  value={jobLookupId}
                  onChange={(e) => setJobLookupId(e.target.value)}
                  placeholder="Например: 48db5dde-13e3-44af-aeef-d6a22048792d"
                />
                <button
                  className="secondary"
                  onClick={() => fetchJobById(jobLookupId)}
                  disabled={jobLookupLoading}
                >
                  {jobLookupLoading ? "Поиск..." : "Найти job"}
                </button>
              </div>
            </div>

            {error && <div className="remark error">{error}</div>}

            {!result && !error && !jobId && (
              <div className="empty">
                Отправьте доказательство на проверку, чтобы увидеть результат.
              </div>
            )}

            {!result && !error && jobId && jobStatus && jobStatus !== "completed" && (
              <div className="summary-card">
                <div className="summary-line">
                  <strong>Job найдена</strong>
                  <span className="pill info">status: {jobStatus}</span>
                </div>
                <p className="muted">
                  Если задача ещё в процессе, результат появится автоматически.
                </p>
              </div>
            )}

            {result && (
              <>
                <div className="summary-card">
                  <div className="summary-line">
                    <strong>{result.summary}</strong>
                    <span className={`pill ${result.is_valid ? "ok" : "error"}`}>
                      {result.is_valid ? "valid" : "invalid"}
                    </span>
                    <span className="pill warn">confidence {result.confidence_score}</span>
                  </div>

                  {result.iteration_recommendation && (
                    <p className="muted">{result.iteration_recommendation}</p>
                  )}

                  <div className="jobs-box">
                    <div className="job-line">
                      <span>fact rounds: {result.phases?.fact_checking?.rounds_taken ?? 0}</span>
                      <span>logic rounds: {result.phases?.logic_checking?.rounds_taken ?? 0}</span>
                      <span>remarks: {allRemarks.length}</span>
                    </div>
                    {jobId && (
                      <div className="job-line">
                        job: {jobId} · status: {jobStatus}
                      </div>
                    )}
                  </div>
                </div>

                {globalRemarks.length > 0 && (
                  <>
                    <div className="section-title">Глобальные замечания</div>
                    <div className="remarks-list">
                      {globalRemarks.map((remark, idx) => (
                        <RemarkCard key={`global-${idx}`} remark={remark} theoremsCache={theoremsCache} />
                      ))}
                    </div>
                    <div className="divider"></div>
                  </>
                )}

                <div className="section-title">Шаги доказательства</div>
                <div className="muted" style={{ marginBottom: 10 }}>
                  Кликните по шагу, чтобы посмотреть, на какую теорему или факт ссылалась модель.
                </div>
                <div className="steps">
                  {(result.parsed_steps || []).map((step, index) => {
                    const directRemarks = allRemarks.filter((item) => item.step_id === index);
                    const affectedRemarks = allRemarks.filter((item) => {
                      if (item.step_id === index) return false;
                      return Array.isArray(item.affected_steps) && item.affected_steps.includes(index);
                    });

                    const stepRemarks = [...directRemarks, ...affectedRemarks];
                    const stepTheorems = stepTheoremMap[index] || [];
                    const isActive = activeStepIndex === index;

                    return (
                      <div
                        className={`step clickable ${isActive ? "active" : ""}`}
                        key={index}
                        onClick={() => setActiveStepIndex(isActive ? null : index)}
                        onKeyDown={(e) => {
                          if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            setActiveStepIndex(isActive ? null : index);
                          }
                        }}
                        role="button"
                        tabIndex={0}
                        aria-expanded={isActive}
                      >
                        <div className="step-head">
                          <div>
                            <div className="step-title">
                              Шаг {index}: {step.content || "—"}
                            </div>
                            <div className="step-meta">
                              тип: {step.step_type} · обоснование: {step.justification || "не указано"}
                            </div>
                          </div>
                          <div className="step-toggle">
                            {isActive ? "Скрыть теоремы" : "Показать теоремы"}
                          </div>
                        </div>

                        <div className="step-theorem-summary">
                          {stepTheorems.length > 0 ? (
                            stepTheorems.slice(0, 3).map((item, chipIndex) => (
                              <span className="theorem-chip" key={`${item.theoremName}-${chipIndex}`}>
                                {item.theoremName || item.references[0] || item.factNames[0] || "Теорема"}
                              </span>
                            ))
                          ) : (
                            <span className="theorem-chip">Явная теорема не выделена</span>
                          )}
                        </div>

                        {step.content_latex && (
                          <div style={{ marginTop: 10 }}>
                            <MathText text={step.content_latex} className="muted" />
                          </div>
                        )}

                        {isActive && (
                          <StepTheoremsPanel items={stepTheorems} theoremsCache={theoremsCache} />
                        )}

                        {stepRemarks.length === 0 && (
                          <div className="empty">Замечаний по шагу нет.</div>
                        )}

                        {stepRemarks.map((remark, idx) => (
                          <RemarkCard
                            key={`step-${index}-${idx}`}
                            remark={remark}
                            theoremsCache={theoremsCache}
                          />
                        ))}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
